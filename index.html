<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <title>余烬回响 — Embers Echoes</title>
  <meta name="description" content="一个关于余烬、理智与存在的渐进式文字冒险">
  <meta property="og:title" content="余烬回响 — Embers Echoes">
  <meta property="og:description" content="一个关于余烬、理智与存在的渐进式文字冒险">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="favicon.png" />

  <!-- jQuery -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.1/jquery.min.js"></script>
  <script>
    if (!window.jQuery) {
      document.write('<script src="lib/jquery.min.js"><\/script>');
    }
  </script>
  <script src="lib/jquery.color-2.1.2.min.js"></script>

  <!-- Dispatch (must load before other scripts) -->
  <script src="script/dispatch.js"></script>

  <!-- Core Systems -->
  <script src="script/Button.js"></script>
  <script src="script/state_manager.js"></script>
  <script src="script/notifications.js"></script>
  <script src="script/header.js"></script>
  <script src="script/engine.js"></script>

  <!-- Game Modules -->
  <script src="script/narrative.js"></script>
  <script src="script/terminal.js"></script>
  <script src="script/nexus.js"></script>
  <script src="script/population.js"></script>
  <script src="script/merchant.js"></script>
  <script src="script/sanity.js"></script>
  <script src="script/events_embers.js"></script>

  <!-- Phase 4 Modules -->
  <script src="script/rift_map.js"></script>
  <script src="script/combat.js"></script>
  <script src="script/survival.js"></script>

  <!-- Phase 5 Modules -->
  <script src="script/matrix_sink.js"></script>
  <script src="script/endgame.js"></script>
  <script src="script/ship.js"></script>
  <script src="script/space.js"></script>
  <script src="script/echoes.js"></script>
  <script src="script/gallery.js"></script>
  <script src="script/relics.js"></script>

  <!-- Stylesheets -->
  <link rel="stylesheet" type="text/css" href="css/core.css" />
  <link rel="stylesheet" type="text/css" href="css/glitch.css" />
  <link rel="stylesheet" type="text/css" href="css/terminal.css" />
  <link rel="stylesheet" type="text/css" href="css/nexus.css" />
  <link rel="stylesheet" type="text/css" href="css/map.css" />
  <link rel="stylesheet" type="text/css" href="css/endgame.css" />

  <!-- Boot -->
  <script>
    $(document).ready(function () {
      // Initialize the engine with debug mode
      Engine.options.debug = true;
      Engine.init();

      // Initialize optional modules
      Sanity.init();
      Events.init();
      Merchant.init();
      RiftMap.init();
      Combat.init();
      Survival.init();
      MatrixSink.init();
      Endgame.init();
      Ship.init();
      Space.init();
      Echoes.init();
      Gallery.init();
      Relics.init();
    });
  </script>
</head>

<body class="phase-null">
  <div id="ee-wrapper">
    <!-- Save notification -->
    <div id="saveNotify">已保存</div>

    <!-- Header tabs -->
    <div id="ee-header">
      <!-- Tabs are added dynamically by modules -->
    </div>

    <!-- Main content -->
    <div id="ee-content">
      <div id="ee-main">
        <!-- Left panel: Status -->
        <div id="ee-left">
          <div id="status-flow" class="ee-panel" style="display:none; margin-bottom: 16px">
             <div class="ee-panel-title">净流速 (Net Flow)</div>
             <div class="ee-stores">
               <div class="ee-store-row">
                 <span class="ee-store-name">余烬</span>
                 <span class="ee-store-val" id="flow-val-ember">0/s</span>
               </div>
               <div class="ee-store-row">
                 <span class="ee-store-name">灰质</span>
                 <span class="ee-store-val" id="flow-val-matter">0/s</span>
               </div>
             </div>
          </div>
          <div id="stores-panel" class="ee-panel">
            <div class="ee-panel-title">资源</div>
            <div class="ee-stores">
              <!-- Store rows injected by engine -->
            </div>
          </div>

          <!-- Erosion display (Phase 3+) -->
          <div id="erosion-panel" class="ee-panel" style="display:none">
            <div class="ee-panel-title">侵蚀度</div>
            <div class="ee-stores">
              <div class="ee-store-row">
                <span class="ee-store-name">侵蚀</span>
                <div class="ee-store-bar">
                  <div class="ee-store-bar-fill erosion-bar"
                    style="width:0%;background:linear-gradient(90deg,var(--erosion-green),var(--erosion-toxic))"></div>
                </div>
                <span class="ee-store-val erosion-val">0</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Middle panel: Actions & Main Interface -->
        <div id="ee-middle">
          <!-- Panels are injected by modules -->
        </div>

        <!-- Right panel: Terminal Log -->
        <div id="ee-right">
          <!-- Terminal is injected here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Notifications container -->
  <div id="ee-notifications"></div>
</body>

</html>
